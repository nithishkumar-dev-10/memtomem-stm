name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check src
      - run: uv run ruff format --check src

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: mypy (gradual)
        run: uv run mypy src
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest -m "not ollama and not bench_qa_meta and not bench_qa_llm_judge" --tb=short -q

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: Run tutorial notebook
        run: |
          uv run pytest --nbmake \
            notebooks/01_quickstart_proxy_setup.ipynb \
            --nbmake-timeout=180 --tb=short -q

  bench_qa:
    # Advisory for the first 1–2 weeks while per-scenario thresholds
    # settle. Do not promote to a required check until qa_gate_min /
    # compressed_chars floors have been ratcheted up from observed data.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: Run bench_qa suite
        env:
          BENCH_QA_REPORT_DIR: ${{ github.workspace }}/bench-qa-report
        run: uv run pytest -m bench_qa --tb=short -q
      - name: Upload bench_qa report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-qa-report
          path: bench-qa-report/
          if-no-files-found: warn
          retention-days: 14
