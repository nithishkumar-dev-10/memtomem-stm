name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicit permissions — repository default may be read-only.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT from an admin account. The built-in GITHUB_TOKEN cannot push
          # to `main` because branch protection requires status checks + a PR
          # review, and GITHUB_TOKEN is not an admin actor. `enforce_admins`
          # is false on this repo, so an admin PAT bypasses protection and
          # lets the bot commit the signature JSON directly. See #89.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          # Pin the action's `isRemoteRepoOrOrgConfigured` branch to true even
          # though signatures live in this same repo. Without these inputs the
          # action ignores PERSONAL_ACCESS_TOKEN and uses GITHUB_TOKEN, which
          # cannot bypass branch protection on `main`. See #89 for the source-
          # code analysis (src/persistence/persistence.ts).
          remote-organization-name: memtomem
          remote-repository-name: memtomem-stm
          path-to-document: 'https://github.com/memtomem/memtomem-stm/blob/main/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],memtomem
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge, please sign the [Contributor License Agreement](https://github.com/memtomem/memtomem-stm/blob/main/CLA.md).

            To sign, comment on this pull request with the statement below. You only need to sign once per GitHub account.
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️ ✅'
